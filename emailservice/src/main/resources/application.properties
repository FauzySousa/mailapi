# ===============================
# SERVER CONFIGURATION
# ===============================
# A Railway define a porta automaticamente através da variável PORT
server.port=${PORT:8080}

# ===============================
# RESEND API CONFIGURATION (NOVO)
# ===============================
# Mapeamos as variáveis que você já tem na Railway para o novo código
resend.api.key=${MAIL_PASSWORD}
resend.from=${SPRING_MAIL_FROM:onboarding@resend.dev}

# ===============================
# ACTUATOR (MONITORAMENTO)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# ===============================
# LOGGING
# ===============================
logging.level.com.fauzy.emailservice=INFO
# Removido o debug de SMTP pois não usamos mais esse protocolo