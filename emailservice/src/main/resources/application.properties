# ===============================
# SERVER CONFIGURATION
# ===============================
# A Railway define a porta automaticamente através da variável PORT
server.port=${PORT:8080}

# ===============================
# MAIL CONFIGURATION (RESEND SMTP)
# ===============================
spring.mail.host=smtp.resend.com
spring.mail.port=465

# No Resend, o usuário é sempre a palavra "resend"
spring.mail.username=${MAIL_USERNAME:resend}

# A senha deve ser a sua API KEY gerada no Resend (re_...)
# Configure a variável MAIL_PASSWORD no painel da Railway
spring.mail.password=${MAIL_PASSWORD}

# E-mail de origem autorizado pelo Resend
# No plano gratuito, use: onboarding@resend.dev
spring.mail.from=${SPRING_MAIL_FROM:onboarding@resend.dev}

# ===============================
# JAVA MAIL PROPERTIES (SSL/TIMEOUTS)
# ===============================
spring.mail.properties.mail.smtp.auth=true

# Usamos SSL para a porta 465 (mais estável em servidores Cloud)
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.resend.com

# Timeouts cruciais: Evitam que sua aplicação "trave" se a rede falhar
# 10000ms = 10 segundos
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===============================
# ACTUATOR (MONITORAMENTO)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# ===============================
# LOGGING
# ===============================
logging.level.com.fauzy.emailservice=INFO
# Ative a linha abaixo se precisar ver o log detalhado do protocolo SMTP (debug apenas)
# spring.mail.properties.mail.debug=true